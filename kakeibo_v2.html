<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="太一の家計簿">
<title>太一の家計簿</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #080612;
    --bg2: #0e0a1e;
    --card: rgba(255,255,255,0.04);
    --border: rgba(120,100,220,0.18);
    --accent: #9d7ff5;
    --accent2: #5eaaf5;
    --green: #2dce89;
    --red: #f75a5a;
    --amber: #f5a623;
    --text: #ddd4f5;
    --muted: #7a6e9a;
    --dim: #3d3560;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; }
  input, select, button { font-family: 'Noto Sans JP', sans-serif; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; position: relative; }

  /* HEADER */
  .header { padding: 52px 18px 12px; background: linear-gradient(180deg, rgba(8,6,18,1) 0%, rgba(8,6,18,0) 100%); position: relative; z-index: 10; flex-shrink: 0; }
  .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 0.06em; background: linear-gradient(120deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
  .header-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .month-nav { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .month-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
  .month-label { flex: 1; text-align: center; font-size: 13px; font-weight: 700; color: var(--accent); }

  /* CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 0 16px 90px; -webkit-overflow-scrolling: touch; }
  .content::-webkit-scrollbar { width: 0; }

  /* BOTTOM NAV */
  .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(8,6,18,0.97); border-top: 1px solid var(--border); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 8px 0 max(16px, env(safe-area-inset-bottom)); z-index: 100; }
  .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; color: var(--dim); font-size: 9px; cursor: pointer; padding: 4px 16px; border-radius: 10px; transition: color 0.15s; }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 22px; }

  /* CARDS */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px; margin-bottom: 12px; }
  .card-title { font-size: 11px; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 14px; font-weight: 500; }

  /* BUDGET BAR */
  .budget-main { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
  .budget-val { font-size: 28px; font-weight: 700; line-height: 1; }
  .budget-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .bar-wrap { height: 8px; background: rgba(120,100,220,0.12); border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
  .bar-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }

  /* ALERT */
  .alert { background: rgba(247,90,90,0.1); border: 1px solid rgba(247,90,90,0.3); border-radius: 12px; padding: 10px 14px; font-size: 12px; color: #ff8a8a; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

  /* KPI GRID */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 12px; }
  .kpi-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .kpi-val { font-size: 18px; font-weight: 700; }

  /* RECENT LIST */
  .entry-row { display: flex; align-items: center; gap: 10px; padding: 10px 6px; border-bottom: 1px solid rgba(120,100,220,0.08); }
  .entry-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-cat { font-size: 13px; color: #c4b5fd; font-weight: 500; }
  .entry-meta { font-size: 10px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-amount { font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .del-btn { background: rgba(247,90,90,0.1); border: none; border-radius: 8px; padding: 4px 8px; color: var(--red); font-size: 12px; cursor: pointer; flex-shrink: 0; }

  /* INPUT FORM */
  .amount-input-wrap { position: relative; margin-bottom: 14px; }
  .yen-prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 18px; pointer-events: none; }
  .amount-input { width: 100%; background: rgba(120,100,220,0.08); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px 14px 16px 36px; color: var(--text); font-size: 26px; font-weight: 700; }
  .amount-input:focus { border-color: var(--accent); outline: none; }
  .field-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .field-input { width: 100%; background: rgba(120,100,220,0.07); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 13px; }
  .field-input:focus { border-color: var(--accent); outline: none; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }

  /* CATEGORY GRID */
  .cat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
  .cat-btn { padding: 10px 4px; border-radius: 12px; border: 1.5px solid var(--border); background: rgba(255,255,255,0.02); color: var(--muted); font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: all 0.15s; }
  .cat-btn.active { background: rgba(157,127,245,0.15); border-color: var(--accent); color: var(--accent); }
  .cat-emoji { font-size: 20px; }

  /* SUBMIT BTN */
  .submit-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn.success { background: linear-gradient(135deg, #059669, #2dce89); }

  /* INCOME BTN */
  .income-btn { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(45,206,137,0.3); background: rgba(45,206,137,0.08); color: var(--green); font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }

  /* TYPE TOGGLE */
  .type-toggle { display: flex; background: rgba(120,100,220,0.08); border-radius: 12px; padding: 4px; margin-bottom: 16px; }
  .type-btn { flex: 1; padding: 8px; border-radius: 9px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; background: none; color: var(--muted); }
  .type-btn.active { background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px 10px 36px; color: var(--text); font-size: 13px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--muted); }

  /* STATS */
  .chart-wrap { position: relative; height: 160px; margin-bottom: 4px; }

  /* SETTINGS */
  .fixed-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(120,100,220,0.08); }
  .fixed-name { flex: 1; font-size: 13px; color: var(--text); }
  .fixed-amount-input { width: 100px; background: rgba(120,100,220,0.08); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; color: var(--text); font-size: 13px; text-align: right; }
  .save-settings-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 14px; }
  .export-btn { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--accent); font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; }

  /* TABS WITHIN STATS */
  .inner-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .inner-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .inner-tab.active { border-color: var(--accent); background: rgba(157,127,245,0.15); color: var(--accent); font-weight: 700; }

  /* INCOME ROW */
  .income-row { display: flex; align-items: center; gap: 10px; padding: 10px 6px; border-bottom: 1px solid rgba(120,100,220,0.08); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 0; font-size: 12px; color: var(--dim); }

  /* PAGE TRANSITIONS */
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

  /* TOAST */
  .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(45,206,137,0.9); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; z-index: 999; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }

  select.field-input option { background: #1a1430; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="header-title">TAICHI KAKEIBO</div>
        <div class="header-sub" id="headerSub"></div>
      </div>
      <div style="text-align:right">
        <div class="budget-label">変動費予算</div>
        <div style="font-size:16px;font-weight:700;color:var(--accent)" id="headerBudget"></div>
      </div>
    </div>
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">◀</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="month-btn" onclick="changeMonth(1)">▶</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- HOME PAGE -->
    <div class="page active" id="page-home">
      <div id="alertBox" style="display:none" class="alert">⚠️ 残り予算が<strong>1万円を切りました！</strong>支出を抑えましょう</div>

      <div class="card">
        <div class="budget-label">今月の変動費</div>
        <div class="budget-main">
          <div>
            <div class="budget-val" id="homeSpent" style="color:var(--accent)">¥0</div>
          </div>
          <div style="text-align:right">
            <div class="budget-label">残り予算</div>
            <div class="budget-val" id="homeRemain" style="color:var(--green)">¥0</div>
          </div>
        </div>
        <div class="bar-wrap"><div class="bar-fill" id="budgetBar" style="width:0%"></div></div>
        <div class="bar-meta">
          <span id="barIdeal"></span>
          <span id="barPct"></span>
        </div>
      </div>

      <div class="kpi-grid">
        <div class="kpi" style="border-color:rgba(45,206,137,0.25)">
          <div class="kpi-label">1日の目安予算</div>
          <div class="kpi-val" style="color:var(--green)" id="dailyBudget">¥0</div>
        </div>
        <div class="kpi" style="border-color:rgba(157,127,245,0.25)">
          <div class="kpi-label">固定費合計</div>
          <div class="kpi-val" style="color:var(--accent)" id="fixedTotal">¥0</div>
        </div>
        <div class="kpi" style="border-color:rgba(94,170,245,0.25)">
          <div class="kpi-label">今月の収入</div>
          <div class="kpi-val" style="color:var(--accent2)" id="homeIncome">¥0</div>
        </div>
        <div class="kpi" style="border-color:rgba(245,166,35,0.25)">
          <div class="kpi-label">貯金目標</div>
          <div class="kpi-val" style="color:var(--amber)">¥30,000</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">最近の支出</div>
        <div id="recentList"><div class="empty">まだ入力がありません</div></div>
      </div>
    </div>

    <!-- INPUT PAGE -->
    <div class="page" id="page-add">
      <div class="card">
        <div class="type-toggle">
          <button class="type-btn active" id="typeExpense" onclick="setType('expense')">💸 支出</button>
          <button class="type-btn" id="typeIncome" onclick="setType('income')">💰 収入</button>
        </div>

        <div class="amount-input-wrap">
          <span class="yen-prefix">¥</span>
          <input type="number" class="amount-input" id="amountInput" placeholder="0">
        </div>

        <div id="expenseFields">
          <div class="field-label">カテゴリ</div>
          <div class="cat-grid" id="catGrid"></div>
        </div>

        <div id="incomeFields" style="display:none">
          <div class="field-label">種別</div>
          <select class="field-input" id="incomeType" style="margin-bottom:14px">
            <option>給与</option>
            <option>ボーナス</option>
            <option>その他収入</option>
          </select>
        </div>

        <div class="two-col">
          <div>
            <div class="field-label">日付</div>
            <input type="date" class="field-input" id="dateInput">
          </div>
          <div>
            <div class="field-label">メモ（任意）</div>
            <input type="text" class="field-input" id="memoInput" placeholder="例: スーパー">
          </div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="addEntry()">記録する</button>

        <!-- AI COMMENT BOX -->
        <div id="aiCommentBox" style="display:none;margin-top:12px;background:rgba(157,127,245,0.08);border:1px solid rgba(157,127,245,0.25);border-radius:14px;padding:14px 16px;animation:fadeIn 0.3s ease">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-size:18px">🤖</span>
            <span style="font-size:11px;color:var(--accent);letter-spacing:0.08em;font-weight:500">AIのひとこと</span>
          </div>
          <div id="aiCommentText" style="font-size:13px;color:var(--text);line-height:1.6">...</div>
        </div>
      </div>
    </div>

    <!-- HISTORY PAGE -->
    <div class="page" id="page-history">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="メモ・カテゴリで検索" oninput="renderHistory()">
      </div>
      <div class="card">
        <div class="card-title" id="historyTitle"></div>
        <div id="historyList"><div class="empty">まだ入力がありません</div></div>
      </div>
    </div>

    <!-- STATS PAGE -->
    <div class="page" id="page-stats">
      <div class="inner-tabs">
        <button class="inner-tab active" onclick="setStatsTab('chart')">グラフ</button>
        <button class="inner-tab" onclick="setStatsTab('cat')">カテゴリ</button>
        <button class="inner-tab" onclick="setStatsTab('compare')">月比較</button>
      </div>

      <div id="statsChart" class="card">
        <div class="card-title">直近14日間の支出</div>
        <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
      </div>

      <div id="statsCat" style="display:none" class="card">
        <div class="card-title">カテゴリ別内訳</div>
        <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
        <div id="catBreakdown"></div>
      </div>

      <div id="statsCompare" style="display:none" class="card">
        <div class="card-title">月別支出比較</div>
        <div class="chart-wrap"><canvas id="barChart"></canvas></div>
      </div>
    </div>

    <!-- SETTINGS PAGE -->
    <div class="page" id="page-settings">
      <div class="card">
        <div class="card-title">固定費の編集</div>
        <div id="fixedList"></div>
        <button class="save-settings-btn" onclick="saveSettings()">💾 保存する</button>
      </div>
      <div class="card" style="margin-top:0">
        <div class="card-title">データ管理</div>
        <button class="export-btn" onclick="exportCSV()">📤 CSVエクスポート</button>
        <button class="export-btn" onclick="clearData()" style="color:var(--red);border-color:rgba(247,90,90,0.3);margin-top:8px">🗑 全データを削除</button>
      </div>
    </div>

  </div><!-- /content -->

  <!-- BOTTOM NAV -->
  <div class="nav">
    <button class="nav-btn active" id="nav-home" onclick="showPage('home')">
      <span class="nav-icon">🏠</span>ホーム
    </button>
    <button class="nav-btn" id="nav-add" onclick="showPage('add')">
      <span class="nav-icon">✏️</span>入力
    </button>
    <button class="nav-btn" id="nav-history" onclick="showPage('history')">
      <span class="nav-icon">📋</span>履歴
    </button>
    <button class="nav-btn" id="nav-stats" onclick="showPage('stats')">
      <span class="nav-icon">📊</span>分析
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showPage('settings')">
      <span class="nav-icon">⚙️</span>設定
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────
const CATEGORIES = [
  {label:"食費",icon:"🍱",color:"#a78bfa"},
  {label:"外食",icon:"🍜",color:"#f472b6"},
  {label:"日用品",icon:"🛒",color:"#60a5fa"},
  {label:"ガソリン",icon:"⛽",color:"#fbbf24"},
  {label:"娯楽",icon:"🎮",color:"#34d399"},
  {label:"交通",icon:"🚗",color:"#fb923c"},
  {label:"飲み",icon:"🍺",color:"#e879f9"},
  {label:"その他",icon:"💸",color:"#94a3b8"},
];

const DEFAULT_FIXED = [
  {name:"奨学金",amount:26433},
  {name:"車の払い",amount:20000},
  {name:"ドコモ",amount:6603},
  {name:"Wi-Fi",amount:3500},
  {name:"電気",amount:8000},
  {name:"ガス",amount:4500},
  {name:"Apple",amount:3890},
  {name:"PlayStation",amount:3000},
  {name:"Amazon",amount:6000},
];

const INCOME_DEFAULT = 190000;
const SAVING = 30000;

let state = {
  entries: [],      // {id, type:'expense'|'income', date, category, amount, memo}
  fixed: [...DEFAULT_FIXED],
  currentMonth: '',
};

let selectedCat = '食費';
let entryType = 'expense';
let currentStatsTab = 'chart';
let charts = {};

// ── STORAGE ───────────────────────────────────────
function save() {
  localStorage.setItem('taichi_kakeibo_v2', JSON.stringify(state));
}
function load() {
  const raw = localStorage.getItem('taichi_kakeibo_v2');
  if (raw) {
    try { Object.assign(state, JSON.parse(raw)); } catch(e){}
  }
  if (!state.currentMonth) {
    state.currentMonth = todayMonth();
  }
}

// ── UTILS ─────────────────────────────────────────
const fmt = n => '¥' + Math.round(n).toLocaleString();
const todayStr = () => new Date().toISOString().slice(0,10);
const todayMonth = () => new Date().toISOString().slice(0,7);
const getMonth = d => d.slice(0,7);

function changeMonth(dir) {
  const [y, m] = state.currentMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + dir, 1);
  state.currentMonth = d.toFullYear ? '' : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  save();
  renderAll();
}

function monthLabel(ym) {
  const [y,m] = ym.split('-');
  return `${y}年${parseInt(m)}月`;
}

function entriesForMonth(month) {
  return state.entries.filter(e => getMonth(e.date) === month);
}
function expensesForMonth(month) {
  return entriesForMonth(month).filter(e => e.type === 'expense');
}
function incomeForMonth(month) {
  return entriesForMonth(month).filter(e => e.type === 'income').reduce((s,e)=>s+e.amount,0);
}
function fixedTotal() {
  return state.fixed.reduce((s,f)=>s+f.amount,0);
}
function variableBudget() {
  const inc = incomeForMonth(state.currentMonth) || INCOME_DEFAULT;
  return inc - fixedTotal() - SAVING;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

// ── INIT ──────────────────────────────────────────
function init() {
  load();
  buildCatGrid();
  document.getElementById('dateInput').value = todayStr();
  buildFixedList();
  renderAll();
}

// ── RENDER ALL ────────────────────────────────────
function renderAll() {
  const ym = state.currentMonth;
  document.getElementById('monthLabel').textContent = monthLabel(ym);
  document.getElementById('headerSub').textContent = ym + ' の家計簿';

  const budget = variableBudget();
  document.getElementById('headerBudget').textContent = fmt(budget);
  document.getElementById('fixedTotal').textContent = fmt(fixedTotal());
  document.getElementById('dailyBudget').textContent = fmt(Math.floor(budget / 30));
  document.getElementById('homeIncome').textContent = fmt(incomeForMonth(ym) || INCOME_DEFAULT);

  const expenses = expensesForMonth(ym);
  const spent = expenses.reduce((s,e)=>s+e.amount,0);
  const remain = budget - spent;
  const pct = Math.min((spent/budget)*100,100);

  document.getElementById('homeSpent').textContent = fmt(spent);
  document.getElementById('homeSpent').style.color = pct>80?'var(--red)':pct>60?'var(--amber)':'var(--accent)';
  document.getElementById('homeRemain').textContent = fmt(remain);
  document.getElementById('homeRemain').style.color = remain<0?'var(--red)':'var(--green)';

  const bar = document.getElementById('budgetBar');
  bar.style.width = pct+'%';
  bar.style.background = pct>80?'linear-gradient(90deg,#f75a5a,#fb923c)':pct>60?'linear-gradient(90deg,#f5a623,#fb923c)':'linear-gradient(90deg,#9d7ff5,#5eaaf5)';

  const isCurrentMonth = ym === todayMonth();
  const daysPassed = isCurrentMonth ? new Date().getDate() : 30;
  const daysInMonth = isCurrentMonth ? new Date(new Date().getFullYear(), new Date().getMonth()+1,0).getDate() : 30;
  const dailyBudgetVal = Math.floor(budget / daysInMonth);
  const idealSpent = dailyBudgetVal * daysPassed;

  document.getElementById('barIdeal').textContent = `目安: ${fmt(idealSpent)}（${daysPassed}日）`;
  document.getElementById('barPct').textContent = Math.round(pct)+'% 消費';

  // Alert
  const alertBox = document.getElementById('alertBox');
  alertBox.style.display = (remain < 10000 && remain > 0) ? 'flex' : 'none';

  renderRecent();
  renderHistory();
  renderStats();
}

// ── RECENT LIST ───────────────────────────────────
function renderRecent() {
  const list = document.getElementById('recentList');
  const all = state.entries.slice().reverse().slice(0,5);
  if (!all.length) { list.innerHTML = '<div class="empty">まだ入力がありません</div>'; return; }
  list.innerHTML = all.map(e => entryHTML(e, false)).join('');
}

function entryHTML(e, showDel=true) {
  const cat = CATEGORIES.find(c=>c.label===e.category) || CATEGORIES[7];
  const isIncome = e.type === 'income';
  const iconBg = isIncome ? 'rgba(45,206,137,0.15)' : `${cat.color}22`;
  const icon = isIncome ? '💰' : cat.icon;
  const amtColor = isIncome ? 'var(--green)' : 'var(--red)';
  const amtPrefix = isIncome ? '+' : '-';
  const label = isIncome ? (e.category || '収入') : e.category;
  return `<div class="entry-row">
    <div class="entry-icon" style="background:${iconBg}">${icon}</div>
    <div class="entry-info">
      <div class="entry-cat">${label}</div>
      <div class="entry-meta">${e.date}${e.memo?' ・ '+e.memo:''}</div>
    </div>
    <div class="entry-amount" style="color:${amtColor}">${amtPrefix}${fmt(e.amount)}</div>
    ${showDel?`<button class="del-btn" onclick="deleteEntry(${e.id})">×</button>`:''}
  </div>`;
}

// ── HISTORY ───────────────────────────────────────
function renderHistory() {
  const search = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const all = state.entries
    .filter(e => getMonth(e.date) === state.currentMonth)
    .filter(e => !search || e.category?.toLowerCase().includes(search) || e.memo?.toLowerCase().includes(search))
    .slice().reverse();

  document.getElementById('historyTitle').textContent = `${monthLabel(state.currentMonth)} の記録（${all.length}件）`;
  const list = document.getElementById('historyList');
  if (!all.length) { list.innerHTML = '<div class="empty">データがありません</div>'; return; }
  list.innerHTML = all.map(e => entryHTML(e, true)).join('');
}

// ── ADD ENTRY ─────────────────────────────────────
async function addEntry() {
  const amount = parseFloat(document.getElementById('amountInput').value);
  if (!amount || isNaN(amount) || amount <= 0) { showToast('金額を入力してください'); return; }
  const date = document.getElementById('dateInput').value || todayStr();
  const memo = document.getElementById('memoInput').value;
  const isIncome = entryType === 'income';
  const category = isIncome ? document.getElementById('incomeType').value : selectedCat;

  const entry = { id: Date.now(), type: entryType, date, category, amount, memo };
  state.entries.push(entry);
  save();

  document.getElementById('amountInput').value = '';
  document.getElementById('memoInput').value = '';

  const btn = document.getElementById('submitBtn');
  btn.textContent = '✓ 保存しました！';
  btn.classList.add('success');
  setTimeout(()=>{ btn.textContent='記録する'; btn.classList.remove('success'); }, 1500);

  showToast(isIncome ? '💰 収入を記録しました' : '✓ 支出を記録しました');
  renderAll();

  // AI コメント
  await fetchAIComment(entry);
}

async function fetchAIComment(entry) {
  const box = document.getElementById('aiCommentBox');
  const text = document.getElementById('aiCommentText');
  box.style.display = 'block';
  text.textContent = '考え中...';

  // 今月の集計情報
  const expenses = expensesForMonth(state.currentMonth);
  const monthSpent = expenses.reduce((s,e)=>s+e.amount,0);
  const budget = variableBudget();
  const remain = budget - monthSpent;
  const isIncome = entry.type === 'income';

  const prompt = `あなたは太一（24歳・山口県在住・工場の設備管理職・転職したばかり）の家計管理アシスタントです。
フレンドリーで親しみやすい口調（タメ口ベース、でも丁寧）で、入力された収支に対してひとこと短いコメントをしてください。

【今回の入力】
種別: ${isIncome ? '収入' : '支出'}
カテゴリ: ${entry.category}
金額: ¥${entry.amount.toLocaleString()}
メモ: ${entry.memo || 'なし'}
日付: ${entry.date}

【今月の状況】
変動費予算: ¥${budget.toLocaleString()}
今月の支出累計: ¥${monthSpent.toLocaleString()}
残り予算: ¥${remain.toLocaleString()}

ルール：
- 1〜3文で短くまとめる
- 絵文字を1〜2個使う
- 褒める・励ます・ちょっとツッコむなど自然なリアクション
- 残り予算が少ない場合は軽く注意する
- 収入なら素直に喜ぶ
- マークダウン記法は使わない`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const comment = data.content?.[0]?.text || 'なるほど、記録したよ！';
    text.textContent = comment;
  } catch(e) {
    text.textContent = '記録完了！引き続き頑張ろう 💪';
  }
}

function deleteEntry(id) {
  state.entries = state.entries.filter(e=>e.id!==id);
  save();
  showToast('削除しました');
  renderAll();
}

// ── CATEGORY GRID ─────────────────────────────────
function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATEGORIES.map(c=>`
    <button class="cat-btn${c.label===selectedCat?' active':''}" onclick="selectCat('${c.label}')" data-cat="${c.label}">
      <span class="cat-emoji">${c.icon}</span>${c.label}
    </button>
  `).join('');
}

function selectCat(label) {
  selectedCat = label;
  document.querySelectorAll('.cat-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.cat===label);
  });
}

// ── TYPE TOGGLE ───────────────────────────────────
function setType(type) {
  entryType = type;
  document.getElementById('typeExpense').classList.toggle('active', type==='expense');
  document.getElementById('typeIncome').classList.toggle('active', type==='income');
  document.getElementById('expenseFields').style.display = type==='expense'?'block':'none';
  document.getElementById('incomeFields').style.display = type==='income'?'block':'none';
  document.getElementById('submitBtn').textContent = type==='income'?'収入を記録する':'記録する';
}

// ── STATS ─────────────────────────────────────────
function setStatsTab(tab) {
  currentStatsTab = tab;
  document.querySelectorAll('.inner-tab').forEach((b,i)=>{
    const tabs = ['chart','cat','compare'];
    b.classList.toggle('active', tabs[i]===tab);
  });
  document.getElementById('statsChart').style.display = tab==='chart'?'block':'none';
  document.getElementById('statsCat').style.display = tab==='cat'?'block':'none';
  document.getElementById('statsCompare').style.display = tab==='compare'?'block':'none';
  renderStats();
}

function renderStats() {
  if (currentStatsTab === 'chart') renderLineChart();
  if (currentStatsTab === 'cat') renderPieChart();
  if (currentStatsTab === 'compare') renderBarChart();
}

function renderLineChart() {
  const labels = [], data = [];
  for (let i=13; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    labels.push(`${d.getMonth()+1}/${d.getDate()}`);
    const total = state.entries.filter(e=>e.date===key&&e.type==='expense').reduce((s,e)=>s+e.amount,0);
    data.push(total);
  }
  if (charts.line) charts.line.destroy();
  const ctx = document.getElementById('lineChart').getContext('2d');
  charts.line = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets:[{ data, borderColor:'#9d7ff5', backgroundColor:'rgba(157,127,245,0.1)', borderWidth:2, pointBackgroundColor:'#9d7ff5', pointRadius:3, fill:true, tension:0.3 }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{
      x:{ticks:{color:'#7a6e9a',font:{size:9}},grid:{color:'rgba(120,100,220,0.08)'}},
      y:{ticks:{color:'#7a6e9a',font:{size:9},callback:v=>`${(v/1000).toFixed(0)}k`},grid:{color:'rgba(120,100,220,0.08)'}}
    }}
  });
}

function renderPieChart() {
  const expenses = expensesForMonth(state.currentMonth);
  const total = expenses.reduce((s,e)=>s+e.amount,0);
  const byCat = CATEGORIES.map(c=>({...c, total:expenses.filter(e=>e.category===c.label).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  if (charts.pie) charts.pie.destroy();
  const ctx = document.getElementById('pieChart').getContext('2d');
  if (!byCat.length) { document.getElementById('catBreakdown').innerHTML='<div class="empty">データがありません</div>'; return; }
  charts.pie = new Chart(ctx, {
    type:'doughnut',
    data:{ labels:byCat.map(c=>c.label), datasets:[{ data:byCat.map(c=>c.total), backgroundColor:byCat.map(c=>c.color), borderColor:'rgba(0,0,0,0)', borderWidth:2 }]},
    options:{ responsive:true, maintainAspectRatio:false, cutout:'55%', plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)}`}}} }
  });

  document.getElementById('catBreakdown').innerHTML = byCat.map(c=>`
    <div class="entry-row">
      <div class="entry-icon" style="background:${c.color}22">${c.icon}</div>
      <div class="entry-info"><div class="entry-cat">${c.label}</div></div>
      <div style="flex:1;height:4px;background:rgba(120,100,220,0.1);border-radius:2px;overflow:hidden;margin:0 10px">
        <div style="width:${(c.total/total)*100}%;height:100%;background:${c.color};border-radius:2px"></div>
      </div>
      <div class="entry-amount" style="color:var(--red)">${fmt(c.total)}</div>
    </div>
  `).join('');
}

function renderBarChart() {
  // Last 6 months
  const months = [];
  for (let i=5;i>=0;i--) {
    const d = new Date(); d.setMonth(d.getMonth()-i);
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  const labels = months.map(m=>{ const [y,mo]=m.split('-'); return `${parseInt(mo)}月`; });
  const data = months.map(m=>expensesForMonth(m).reduce((s,e)=>s+e.amount,0));

  if (charts.bar) charts.bar.destroy();
  const ctx = document.getElementById('barChart').getContext('2d');
  charts.bar = new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets:[{ data, backgroundColor: months.map(m=>m===state.currentMonth?'#9d7ff5':'rgba(157,127,245,0.3)'), borderRadius:6, borderSkipped:false }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{
      x:{ticks:{color:'#7a6e9a',font:{size:10}},grid:{display:false}},
      y:{ticks:{color:'#7a6e9a',font:{size:9},callback:v=>`${(v/1000).toFixed(0)}k`},grid:{color:'rgba(120,100,220,0.08)'}}
    }}
  });
}

// ── SETTINGS ──────────────────────────────────────
function buildFixedList() {
  document.getElementById('fixedList').innerHTML = state.fixed.map((f,i)=>`
    <div class="fixed-row">
      <div class="fixed-name">${f.name}</div>
      <input type="number" class="fixed-amount-input" value="${f.amount}" id="fixed_${i}">
    </div>
  `).join('');
}

function saveSettings() {
  state.fixed = state.fixed.map((f,i)=>({
    ...f,
    amount: parseFloat(document.getElementById(`fixed_${i}`)?.value||f.amount)
  }));
  save();
  showToast('💾 設定を保存しました');
  renderAll();
}

// ── CSV EXPORT ────────────────────────────────────
function exportCSV() {
  const header = '日付,種別,カテゴリ,金額,メモ\n';
  const rows = state.entries.map(e=>`${e.date},${e.type==='income'?'収入':'支出'},${e.category||''},${e.amount},${e.memo||''}`).join('\n');
  const blob = new Blob(['\uFEFF'+header+rows], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`kakeibo_${state.currentMonth}.csv`; a.click();
  showToast('📤 エクスポートしました');
}

function clearData() {
  if (confirm('全データを削除しますか？この操作は元に戻せません。')) {
    state.entries = [];
    save();
    showToast('🗑 データを削除しました');
    renderAll();
  }
}

// ── NAVIGATION ────────────────────────────────────
function showPage(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page).classList.add('active');
  if (page==='stats') renderStats();
  if (page==='history') renderHistory();
  if (page==='settings') buildFixedList();
}

// ── START ──────────────────────────────────────────
init();
</script>
</body>
</html>
